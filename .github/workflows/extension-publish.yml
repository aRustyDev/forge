name: Extension Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.0). Uses latest tag if empty.'
        type: string
      skip_chrome:
        description: 'Skip Chrome Web Store publish'
        type: boolean
        default: false
      skip_firefox:
        description: 'Skip Firefox Add-ons publish'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$TAG" ]; then
              echo "::error::No tag found. Push a tag or provide one via workflow_dispatch."
              exit 1
            fi
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION from tag $TAG"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(jq -r .version packages/extension/manifest.json)
          if [ "$MANIFEST_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Manifest version ($MANIFEST_VERSION) does not match tag (${{ steps.version.outputs.version }}). Bump the manifest before tagging."
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run extension tests
        run: cd packages/extension && bun test

      - name: Build both browsers
        run: cd packages/extension && bun run build

      - name: Package artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          (cd packages/extension/dist/chrome && zip -r "$GITHUB_WORKSPACE/forge-job-tools-chrome-v${VERSION}.zip" .)
          (cd packages/extension/dist/firefox && zip -r "$GITHUB_WORKSPACE/forge-job-tools-firefox-v${VERSION}.zip" .)
          git archive HEAD --prefix=forge-source/ -o forge-job-tools-source.zip
          echo "Packaged:"
          ls -la forge-job-tools-*.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: |
            forge-job-tools-chrome-v*.zip
            forge-job-tools-firefox-v*.zip
            forge-job-tools-source.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-packages

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          files: |
            forge-job-tools-chrome-v*.zip
            forge-job-tools-firefox-v*.zip
            forge-job-tools-source.zip
          generate_release_notes: true

  publish-chrome:
    needs: [build, release]
    runs-on: ubuntu-latest
    environment: chrome-web-store
    if: >-
      startsWith(github.ref, 'refs/tags/v')
      && !inputs.skip_chrome
    steps:
      - name: Load Forge metadata
        uses: aRustyDev/load-secrets-action@main
        with:
          environment-id: ${{ secrets.OP_ENVIRONMENT_ID_FORGE }}
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SVC_ACCT_TOKEN }}

      - name: Load Chrome Web Store credentials
        uses: aRustyDev/load-secrets-action@main
        with:
          environment-id: ${{ secrets.OP_ENVIRONMENT_ID_CHROME }}
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SVC_ACCT_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-packages

      - name: Upload to Chrome Web Store
        id: upload
        continue-on-error: true
        run: |
          ZIP="forge-job-tools-chrome-v${{ needs.build.outputs.version }}.zip"
          if [ ! -f "$ZIP" ]; then
            echo "::error::Chrome zip not found: $ZIP"
            exit 1
          fi

          # Get access token
          TOKEN_RESPONSE=$(curl -s -X POST \
            -d "client_id=${CHROME_CLIENT_ID}&client_secret=${CHROME_CLIENT_SECRET}&refresh_token=${CHROME_REFRESH_TOKEN}&grant_type=refresh_token" \
            https://oauth2.googleapis.com/token)
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to get access token"
            echo "$TOKEN_RESPONSE" | jq .
            exit 1
          fi

          # Upload
          UPLOAD_RESPONSE=$(curl -s -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T "$ZIP" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CHROME_EXTENSION_ID}")

          UPLOAD_STATUS=$(echo "$UPLOAD_RESPONSE" | jq -r '.uploadState')
          echo "Upload status: $UPLOAD_STATUS"

          if [ "$UPLOAD_STATUS" = "FAILURE" ]; then
            ERRORS=$(echo "$UPLOAD_RESPONSE" | jq -r '.itemError[]?.error_code // empty')
            ERROR_DETAIL=$(echo "$UPLOAD_RESPONSE" | jq -r '.itemError[]?.error_detail // empty')

            # Idempotent: version already uploaded or item in pending review
            if echo "$ERRORS" | grep -qi "ITEM_NOT_UPDATABLE"; then
              echo "::warning::Chrome item is in pending review — cannot update. Skipping."
              exit 0
            fi
            if echo "$ERROR_DETAIL" | grep -qi "already"; then
              echo "::warning::Version already uploaded to Chrome Web Store — skipping."
              exit 0
            fi

            echo "::error::Chrome upload failed"
            echo "$UPLOAD_RESPONSE" | jq .
            exit 1
          fi

          echo "already_published=false" >> "$GITHUB_OUTPUT"

          # Publish
          PUBLISH_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${CHROME_EXTENSION_ID}/publish")

          PUBLISH_STATUS=$(echo "$PUBLISH_RESPONSE" | jq -r '.status[0]')
          echo "Publish status: $PUBLISH_STATUS"

          if [ "$PUBLISH_STATUS" != "OK" ] && [ "$PUBLISH_STATUS" != "PUBLISHED_WITH_FRICTION_WARNING" ]; then
            # Check if already published
            if echo "$PUBLISH_RESPONSE" | jq -r '.statusDetail[]' | grep -qi "already"; then
              echo "::warning::Version already published on Chrome Web Store — skipping."
              exit 0
            fi
            echo "::error::Chrome publish failed"
            echo "$PUBLISH_RESPONSE" | jq .
            exit 1
          fi

          echo "Published to Chrome Web Store"

      - name: Chrome publish result
        if: steps.upload.outcome == 'failure'
        run: |
          echo "::error::Chrome Web Store publish failed. Use workflow_dispatch with skip_chrome=true to retry Firefox only."
          exit 1

  publish-firefox:
    needs: [build, release]
    runs-on: ubuntu-latest
    environment: firefox-addons
    if: >-
      startsWith(github.ref, 'refs/tags/v')
      && !inputs.skip_firefox
    steps:
      - name: Load Firefox Add-ons credentials
        uses: aRustyDev/load-secrets-action@main
        with:
          environment-id: ${{ secrets.OP_ENVIRONMENT_ID_FIREFOX }}
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SVC_ACCT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-packages

      - name: Sign and upload to AMO
        id: upload
        continue-on-error: true
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          ZIP=$(find . -name "forge-job-tools-firefox-v${VERSION}.zip" -print -quit)
          if [ -z "$ZIP" ]; then
            echo "::error::Firefox zip not found. Contents:"
            ls -la
            exit 1
          fi
          echo "Found: $ZIP"

          mkdir -p /tmp/firefox-ext
          unzip "$ZIP" -d /tmp/firefox-ext

          # web-ext sign exits non-zero if version already exists
          echo '{"version": {"license": "MIT"}}' > /tmp/amo-metadata.json
          OUTPUT=$(web-ext sign \
            --source-dir /tmp/firefox-ext \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --channel listed \
            --amo-metadata /tmp/amo-metadata.json 2>&1) || true

          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -qi "already exists\|Version already"; then
            echo "::warning::Version already published on Firefox Add-ons — skipping."
            exit 0
          fi

          if echo "$OUTPUT" | grep -qi "error\|failed\|FAIL"; then
            echo "::error::Firefox AMO publish failed"
            exit 1
          fi

          echo "Published to Firefox Add-ons"

      - name: Firefox publish result
        if: steps.upload.outcome == 'failure'
        run: |
          echo "::error::Firefox Add-ons publish failed. Use workflow_dispatch with skip_firefox=true to retry Chrome only."
          exit 1
